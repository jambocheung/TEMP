<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TEMP | Temporary Links</title>
  <meta name="description" content="TEMP is a simple place for temporary links and short-lived references.">
  <style>
    :root {
      --ink: #f7f3ea;
      --muted: rgba(247, 243, 234, .72);
      --line: rgba(255, 255, 255, .18);
      --glass: rgba(8, 13, 17, .46);
      --accent: #e3a75f;
      --cyan: #70d1cf;
      --ease: cubic-bezier(.2, .8, .2, 1);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif;
      color: var(--ink);
      background: #06090c;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -3;
      background: url("assets/temp-background.png") center / cover no-repeat;
      transform: scale(1.045);
      animation: imageReveal 1800ms var(--ease) both, slowDrift 18s ease-in-out 1800ms infinite alternate;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      background:
        linear-gradient(90deg, rgba(2, 5, 8, .84) 0%, rgba(2, 5, 8, .62) 42%, rgba(2, 5, 8, .22) 100%),
        radial-gradient(circle at 24% 22%, rgba(112, 209, 207, .18), transparent 32%),
        radial-gradient(circle at 78% 72%, rgba(227, 167, 95, .16), transparent 28%);
    }

    main {
      min-height: 100vh;
      display: grid;
      align-items: center;
      padding: clamp(28px, 6vw, 72px);
    }

    .panel {
      width: min(760px, 100%);
      padding: clamp(28px, 5vw, 56px);
      border: 1px solid var(--line);
      background: var(--glass);
      backdrop-filter: blur(22px) saturate(1.18);
      box-shadow: 0 34px 120px rgba(0, 0, 0, .42);
      animation: panelIn 900ms var(--ease) 220ms both;
    }

    .mark {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: clamp(34px, 5vw, 56px);
      color: rgba(247, 243, 234, .7);
      font-size: 12px;
      font-weight: 760;
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    .mark::before {
      content: "";
      width: 42px;
      height: 1px;
      background: linear-gradient(90deg, var(--cyan), var(--accent));
    }

    h1 {
      margin: 0;
      font-size: clamp(64px, 13vw, 156px);
      line-height: .85;
      font-weight: 860;
      letter-spacing: 0;
    }

    .zh {
      margin: clamp(24px, 4vw, 38px) 0 0;
      max-width: 620px;
      font-size: clamp(18px, 2.4vw, 25px);
      line-height: 1.64;
      color: rgba(247, 243, 234, .9);
      font-weight: 520;
    }

    .en {
      margin: 18px 0 0;
      max-width: 620px;
      font-size: clamp(15px, 1.7vw, 18px);
      line-height: 1.72;
      color: var(--muted);
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: clamp(34px, 5vw, 54px);
      padding-top: 22px;
      border-top: 1px solid rgba(255, 255, 255, .14);
    }

    .meta span {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 8px 12px;
      border: 1px solid rgba(255, 255, 255, .14);
      background: rgba(255, 255, 255, .07);
      color: rgba(247, 243, 234, .72);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .line {
      position: fixed;
      left: clamp(24px, 5vw, 64px);
      right: clamp(24px, 5vw, 64px);
      bottom: clamp(22px, 4vw, 48px);
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .34), transparent);
      transform-origin: left;
      animation: lineIn 1200ms var(--ease) 720ms both;
    }

    @keyframes imageReveal {
      from {
        opacity: 0;
        filter: blur(18px) saturate(.8);
        transform: scale(1.1);
      }
      to {
        opacity: 1;
        filter: blur(0) saturate(1);
        transform: scale(1.045);
      }
    }

    @keyframes slowDrift {
      from {
        transform: scale(1.045) translate3d(0, 0, 0);
      }
      to {
        transform: scale(1.075) translate3d(-1.2%, -.8%, 0);
      }
    }

    @keyframes panelIn {
      from {
        opacity: 0;
        transform: translateY(28px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes lineIn {
      from {
        opacity: 0;
        transform: scaleX(0);
      }
      to {
        opacity: 1;
        transform: scaleX(1);
      }
    }

    @media (max-width: 640px) {
      main {
        align-items: end;
        padding-bottom: 74px;
      }

      .panel {
        padding: 26px;
      }

      h1 {
        font-size: clamp(58px, 23vw, 92px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="panel" aria-labelledby="title">
      <div class="mark">jambocheung / TEMP</div>
      <h1 id="title">TEMP</h1>
      <p class="zh">这是一个简单的临时目录，用来放置和整理各类临时链接、短期页面与阶段性参考入口。</p>
      <p class="en">This is a simple temporary directory for collecting temporary links, short-lived pages, and interim references.</p>
      <div class="meta" aria-label="Directory notes">
        <span>Temporary Links</span>
        <span>Short-Lived Pages</span>
        <span>Interim References</span>
      </div>
    </section>
  </main>
  <div class="line" aria-hidden="true"></div>
</body>
</html>
